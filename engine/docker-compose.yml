  physics-engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: physics_engine
    command: ["python", "physics/worker.py"]
    restart: always
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - PYTHONPATH=/app
    volumes:
      - ./logs:/app/logs
      - ./model_artifacts:/app/model_artifacts

  live-trader:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: live_trader
    command: ["python", "execution/live_trader.py"]
    restart: always
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - PYTHONPATH=/app
    volumes:
      - ./logs:/app/logs
      - ./model_artifacts:/app/model_artifacts

volumes:
  pgdata:
